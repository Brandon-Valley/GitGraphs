<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f0e8">
  <title>GitStock User V6</title>
  <meta http-equiv="refresh" content="0; url=https://brandon-valley.github.io/gitstock-user/?v=6">
  <style>
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 20% 5%, #fff 0, transparent 32rem), linear-gradient(#f4f0e8, #eee8de);
      color: #141414;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }
    main {
      width: min(520px, 100%);
      padding: 30px;
      border: 1px solid rgba(20,20,20,.16);
      border-radius: 28px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 24px 80px rgba(37,31,24,.16);
    }
    .brand { font-size: 25px; font-weight: 900; letter-spacing: -.04em; }
    .badge { display: inline-block; margin-left: 8px; padding: 6px 9px; border-radius: 999px; background: #141414; color: #fff; font-size: 10px; letter-spacing: .07em; vertical-align: middle; }
    h1 { margin: 26px 0 0; font-size: clamp(36px, 11vw, 58px); line-height: .96; letter-spacing: -.065em; }
    p { margin: 20px auto 0; max-width: 430px; color: #6d6a63; font-size: 17px; line-height: 1.5; }
    a { display: flex; align-items: center; justify-content: center; min-height: 58px; margin-top: 26px; border-radius: 18px; background: #141414; color: #fff; font-size: 18px; font-weight: 850; text-decoration: none; box-shadow: 0 12px 30px rgba(20,20,20,.18); }
    small { display: block; margin-top: 14px; color: #6d6a63; line-height: 1.4; }
  </style>
  <script>
    (function () {
      var target = "https://brandon-valley.github.io/gitstock-user/?v=6";
      try { window.location.replace(target); } catch (error) {}
      window.setTimeout(function () {
        try { window.location.href = target; } catch (error) {}
      }, 250);
    }());
  </script>
</head>
<body>
  <main>
    <div class="brand">GitStock User <span class="badge">V6 LIVE</span></div>
    <h1>Opening the secure app</h1>
    <p>Android blocks GitHub requests from downloaded <code>content://</code> pages. This file opens the same app over HTTPS, where live GitHub data works.</p>
    <a href="https://brandon-valley.github.io/gitstock-user/?v=6">Open GitStock User</a>
    <small>If Android does not move automatically, tap the button once.</small>
  </main>
</body>
</html>
