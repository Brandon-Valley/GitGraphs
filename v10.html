<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f4f0e8"><title>GitGraphs V10</title><style>html,body{margin:0;min-height:100%;font-family:system-ui,sans-serif;background:#f4f0e8;color:#141414}body{display:grid;place-items:center;background:radial-gradient(circle at 18% 5%,#fff,transparent 32rem),linear-gradient(#f4f0e8,#eee8de)}main{width:min(440px,calc(100% - 32px));text-align:center}h1{margin:0;font-size:30px;letter-spacing:-.05em}p{color:#6d6a63;line-height:1.5}.badge{display:inline-block;margin-left:7px;padding:6px 9px;border-radius:999px;background:#141414;color:#fff;font-size:10px;letter-spacing:.08em}.track{height:6px;margin-top:20px;overflow:hidden;border-radius:99px;background:#14141418}.bar{width:45%;height:100%;background:#141414;animation:m 1s ease-in-out infinite alternate}@keyframes m{to{transform:translateX(122%)}}</style></head><body><main><h1>GitGraphs <span class="badge">V10</span></h1><p id="status">Loading the complete app...</p><div class="track"><div class="bar"></div></div></main><script>const parts=["v8/p00.txt","v8/p01.txt","v8/p02.txt","v8/p03.txt","v8/p04.txt","v8/p05.txt","v8/p06.txt","v8/p07.txt","v8/p08a.txt","v8/p08b.txt","v8/p09.txt","v8/p10.txt","v8/p11.txt","v8/p12.txt"];Promise.all([Promise.all(parts.map((u,i)=>fetch(u+"?v=10",{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error("part "+(i+1)+" returned "+r.status);return r.text()}))),fetch("v8/network.js.txt?v=10",{cache:"no-store"}).then(r=>{if(!r.ok)throw new Error("network client returned "+r.status);return r.text()})]).then(x=>{let html=x[0].join("");const marker="const first=decodeURIComponent";if(!html.includes(marker))throw new Error("network insertion point missing");html=html.replace(marker,x[1]+"\njsonp=requestGitHub;\n"+marker);document.open();document.write(html);document.close()}).catch(e=>{document.getElementById("status").textContent="The app could not finish loading: "+e.message;console.error(e)});</script></body></html>
